## Render Blueprint - Infrastructure as Code
## This file defines all services and databases for the ReleaseCheck application.
## Deploy: Connect this repo to Render and it will auto-detect this file.

databases:
  - name: releasecheck-db
    plan: free
    databaseName: release_checklist
    user: releasecheck
    region: oregon

services:
  - type: web
    name: releasecheck-api
    plan: free
    region: oregon
    runtime: node
    rootDir: cactro-release-check-be
    buildCommand: pnpm install && pnpm run build:prod
    startCommand: node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: releasecheck-db
          property: connectionString
      - key: CORS_ORIGIN
        value: https://cactro-release-check.vercel.app
